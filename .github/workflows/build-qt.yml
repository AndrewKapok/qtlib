name: Qt 6.10.3 全模块静态编译(多Runner并行+WebEngine)

on:
  workflow_dispatch:

jobs:
  # ==========================
  # 层0：必须最先编译 qtbase
  # ==========================
  build-qtbase:
    runs-on: windows-latest
    name: Layer 0 - qtbase
    steps:
      - name: 安装 Python & aqtinstall
        run: |
          python -m pip install -U pip
          pip install aqtinstall

      - name: 自动下载 Qt 源码
        run: |
          aqt install-src --outputdir . windows desktop 6.10.3
          move 6.10.3\Src qt-src

      - name: 安装依赖
        run: choco install ninja jom strawberryperl -y

      - name: 设置 MSVC 环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 配置 qtbase (静态 .lib)
        shell: cmd
        run: |
          cd qt-src
          mkdir build && cd build
          ..\configure.bat ^
            -static -static-runtime -release ^
            -prefix D:\Qt\base ^
            -opensource -confirm-license ^
            -nomake examples -nomake tests ^
            -skip qtwayland -skip qtdoc -skip qtdocgallery ^
            -make qtbase

      - name: 最高线程编译
        shell: cmd
        run: |
          cd qt-src\build
          jom -j %NUMBER_OF_PROCESSORS%
          jom install

      - name: 上传 Qt 源码
        uses: actions/upload-artifact@v4
        with:
          name: qt-src
          path: qt-src

      - name: 上传基础库
        uses: actions/upload-artifact@v4
        with:
          name: qt-base
          path: D:\Qt\base

  # ==========================
  # 层1：并行编译组A（无互相依赖）
  # ==========================
  build-layer1a:
    runs-on: windows-latest
    needs: build-qtbase
    name: Layer1A - svg,tools,5compat,serialport
    steps:
      - uses: actions/download-artifact@v4
        with: { name: qt-base, path: D:\Qt\base }
      - uses: actions/download-artifact@v4
        with: { name: qt-src, path: qt-src }
      - run: choco install ninja jom strawberryperl -y

      - name: 设置 MSVC 环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 编译模块
        shell: cmd
        run: |
          set PATH=D:\Qt\base\bin;%PATH%
          cd qt-src && mkdir build && cd build
          ..\configure.bat -static -static-runtime -release -prefix D:\Qt\layer1a
          jom -j %NUMBER_OF_PROCESSORS% ^
            module-qtsvg ^
            module-qttools ^
            module-qt5compat ^
            module-qtserialport
          jom install

      - uses: actions/upload-artifact@v4
        with: { name: qt-layer1a, path: D:\Qt\layer1a }

  # ==========================
  # 层1：并行编译组B
  # ==========================
  build-layer1b:
    runs-on: windows-latest
    needs: build-qtbase
    name: Layer1B - imageformats,networkauth,mqtt,translations
    steps:
      - uses: actions/download-artifact@v4
        with: { name: qt-base, path: D:\Qt\base }
      - uses: actions/download-artifact@v4
        with: { name: qt-src, path: qt-src }
      - run: choco install ninja jom strawberryperl -y

      - name: 设置 MSVC 环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 编译模块
        shell: cmd
        run: |
          set PATH=D:\Qt\base\bin;%PATH%
          cd qt-src && mkdir build && cd build
          ..\configure.bat -static -static-runtime -release -prefix D:\Qt\layer1b
          jom -j %NUMBER_OF_PROCESSORS% ^
            module-qtimageformats ^
            module-qtnetworkauth ^
            module-qtmqtt ^
            module-qttranslations
          jom install

      - uses: actions/upload-artifact@v4
        with: { name: qt-layer1b, path: D:\Qt\layer1b }

  # ==========================
  # 层2：依赖 qtdeclarative(QML/Quick)
  # ==========================
  build-layer2:
    runs-on: windows-latest
    needs: [ build-layer1a, build-layer1b ]
    name: Layer2 - declarative,quick,multimedia,websockets
    steps:
      - uses: actions/download-artifact@v4
        with: { name: qt-base, path: D:\Qt\base }
      - uses: actions/download-artifact@v4
        with: { name: qt-src, path: qt-src }
      - run: choco install ninja jom strawberryperl -y

      - name: 设置 MSVC 环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 编译层2模块
        shell: cmd
        run: |
          set PATH=D:\Qt\base\bin;%PATH%
          cd qt-src && mkdir build && cd build
          ..\configure.bat -static -static-runtime -release -prefix D:\Qt\layer2
          jom -j %NUMBER_OF_PROCESSORS% ^
            module-qtdeclarative ^
            module-qtquickcontrols2 ^
            module-qtmultimedia ^
            module-qtwebsockets ^
            module-qtwebchannel
          jom install

      - uses: actions/upload-artifact@v4
        with: { name: qt-layer2, path: D:\Qt\layer2 }

  # ==========================
  # 层3：最后编译 WebEngine
  # ==========================
  build-webengine:
    runs-on: windows-latest
    needs: build-layer2
    name: Layer3 - WebEngine
    steps:
      - uses: actions/download-artifact@v4
        with: { name: qt-base, path: D:\Qt\base }
      - uses: actions/download-artifact@v4
        with: { name: qt-src, path: qt-src }
      - run: choco install ninja jom strawberryperl -y

      - name: 设置 MSVC 环境
        uses: ilammy/msvc-dev-cmd@v1

      - name: 编译 WebEngine
        shell: cmd
        run: |
          set PATH=D:\Qt\base\bin;%PATH%
          cd qt-src && mkdir build && cd build
          ..\configure.bat -static -static-runtime -release -prefix D:\Qt\webengine
          jom -j %NUMBER_OF_PROCESSORS% module-qtwebengine
          jom install

      - uses: actions/upload-artifact@v4
        with: { name: qt-webengine, path: D:\Qt\webengine }

  # ==========================
  # 最终合并完整静态SDK
  # ==========================
  merge-sdk:
    runs-on: windows-latest
    needs: [ build-qtbase, build-layer1a, build-layer1b, build-layer2, build-webengine ]
    name: 合并并上传完整Qt静态SDK
    steps:
      - name: 下载所有编译产物
        uses: actions/download-artifact@v4
        with: { path: artifacts }

      - name: 合并成一个完整SDK
        run: |
          mkdir D:\Qt-6.10.3-Static-Full
          foreach ($dir in Get-ChildItem artifacts/qt-*) {
            robocopy $dir D:\Qt-6.10.3-Static-Full /E /IS /IT
          }

      - name: 打包7z
        run: 7z a Qt-6.10.3-Static-Full.7z D:\Qt-6.10.3-Static-Full

      - name: 上传最终SDK
        uses: actions/upload-artifact@v4
        with:
          name: Qt-6.10.3-Static-Full
          path: Qt-6.10.3-Static-Full.7z